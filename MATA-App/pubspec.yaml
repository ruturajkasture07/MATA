name: mata_app
description: Multimodal Accessible Textbook Assistant

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  camera: ^0.12.0+1
  image_picker: ^1.0.4
  flutter_tts: ^4.2.5
  shared_preferences: ^2.2.1
  flutter_secure_storage: ^10.0.0
  file_picker: ^12.0.0-beta.4
  cupertino_icons: ^1.0.2
  speech_to_text: ^7.3.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  provider: ^6.1.5+1
  jwt_decoder: ^2.0.1
  sensors_plus: ^7.0.0
  google_mlkit_document_scanner: ^0.4.1
  audioplayers: ^6.6.0
  flutter_markdown: ^0.7.7+1
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  